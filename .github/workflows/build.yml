name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            artifact_name: rust-todo-webapp
            asset_name: rust-todo-webapp-linux-x86_64
            build_target: ""
            test_command: cargo test --locked
            build_command: cargo build --release --locked
          - name: linux-arm64
            os: ubuntu-latest
            artifact_name: rust-todo-webapp
            asset_name: rust-todo-webapp-linux-arm64
            build_target: aarch64-unknown-linux-gnu
            test_command: cargo test --locked
            build_command: cargo build --release --locked --target aarch64-unknown-linux-gnu
          - name: windows-x86_64
            os: windows-latest
            artifact_name: rust-todo-webapp.exe
            asset_name: rust-todo-webapp-windows-x86_64.exe
            build_target: ""
            test_command: cargo test --locked
            build_command: cargo build --release --locked
          - name: macos-arm64
            os: macos-latest
            artifact_name: rust-todo-webapp
            asset_name: rust-todo-webapp-macos-arm64
            build_target: ""
            test_command: cargo test --locked
            build_command: cargo build --release --locked

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.build_target }}

      - name: Install Linux ARM64 linker
        if: matrix.build_target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Run tests
        run: ${{ matrix.test_command }}

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: ${{ matrix.build_command }}

      - name: Prepare artifact directory (Linux/macOS native)
        if: runner.os != 'Windows' && matrix.build_target == ''
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}
          cp README.md dist/README.md

      - name: Prepare artifact directory (Linux ARM64 cross build)
        if: runner.os != 'Windows' && matrix.build_target != ''
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.build_target }}/release/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}
          cp README.md dist/README.md

      - name: Prepare artifact directory (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"
          Copy-Item README.md dist/README.md

      - name: Create zip archive (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          zip -r ../${{ matrix.asset_name }}.zip .

      - name: Create zip archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\* -DestinationPath "${{ matrix.asset_name }}.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.zip
          if-no-files-found: error

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display downloaded files
        run: find release-artifacts -maxdepth 2 -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*/*.zip
          generate_release_notes: true
